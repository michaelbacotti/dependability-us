<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="canonical" href="{{ .Permalink }}" />
  <title>{{ if .Title }}{{ .Title }} | {{ .Site.Title }}{{ else }}{{ .Site.Title }}{{ end }}</title>

  {{ with .Description }}
  <meta name="description" content="{{ . }}" />
  {{ else }}
  <meta name="description" content="{{ .Site.Params.description }}" />
  {{ end }}

  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}" />
  <meta property="og:type" content="{{ .Type }}" />
  <meta property="og:url" content="{{ .Permalink }}" />

  {{ with .Params.ogImage }}
  <meta property="og:image" content="{{ . }}" />
  {{ end }}

  <meta name="google-adsense-account" content="{{ .Site.Params.adSenseAccount }}" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adSenseAccount }}" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ relLangURL "/css/style.css" }}" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.analyticsID }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ .Site.Params.analyticsID }}');
  </script>

  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "site/nav.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "site/footer.html" . }}

  <script src="{{ relLangURL "/js/main.js" }}"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
