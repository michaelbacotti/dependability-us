{{ define "main" }}

<section class="page-hero">
    <div class="container">
        <p class="hero-eyebrow">{{ .Params.eyebrow }}</p>
        <h1>{{ .Title }}</h1>
        {{ with .Params.subtitle }}<p class="page-hero-sub">{{ . }}</p>{{ end }}
    </div>
</section>

<div class="page-main">
  <div class="container">
    {{ .Content }}
  </div>
</div>

{{ end }}
