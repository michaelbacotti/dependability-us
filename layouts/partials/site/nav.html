<nav id="site-nav" class="navbar" style="width:100%;background:var(--navy);border-bottom:2px solid var(--gold);">
  <div style="max-width:var(--max-width);margin:0 auto;">
  <a href="{{ .Site.BaseURL }}" class="nav-brand" style="color:var(--white);text-decoration:none;font-family:var(--font-heading);font-size:1.2rem;font-weight:700;letter-spacing:.01em;white-space:nowrap;">
    {{ .Site.Params.brandName }}<span style="color:var(--gold);">{{ with .Site.Params.brandAccent }}&nbsp;{{ . }}{{ end }}</span>
  </a>
  <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <div id="navLinks" class="nav-links">
    {{ range .Site.Params.navLinks }}
    <a href="{{ .url | absLangURL }}"{{ if eq $.RelPermalink .url }} class="active"{{ end }}>
      {{ .name }}
    </a>
    {{ end }}
  </div>
  </div>
</nav>
